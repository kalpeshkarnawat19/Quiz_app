<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Test your knowledge on Data Structures and Algorithms with this interactive quiz.">
    <title>DSA Quiz Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="stars"></div>
    <div class="twinkling"></div>

    <div class="container">
        <!-- Start Page -->
        <!-- Theme toggle only on home page -->
        <div id="theme-toggle-wrapper">
            <button id="theme-toggle" class="secondary-btn"
                style="position:absolute; top:1rem; right:1rem; width:44px; height:44px; display:flex; align-items:center; justify-content:center; padding:0; z-index:100;">
                <img id="theme-icon" src="icon-moon.svg" alt="Toggle theme" width="28" height="28" />
            </button>
        </div>
        <div id="start-page" class="view active">
            <h1>DSA Quiz Portal</h1>
            <p>Test your knowledge on Data Structures and Algorithms.</p>

            <div class="topic-selection">
                <label for="num-questions">Number of Questions (10-30):</label>
                <input type="number" id="num-questions" class="dropdown" min="10" max="30" value="10">
            </div>

            <button id="start-btn" class="primary-btn">Start Quiz</button>
        </div>

        <!-- Quiz Interface -->
        <div id="quiz-page" class="view">
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
            <div class="quiz-header">
                <span id="question-number">Question 1 of 10</span>
            </div>

            <div id="question-container">
                <h2 id="question-text">Question goes here?</h2>
                <div id="options-container" class="options">
                    <!-- Options will be injected here -->
                </div>
            </div>
            <div id="error-message" class="error hidden">Please select an answer to continue.</div>

            <div class="navigation-buttons">
                <button id="prev-btn" class="secondary-btn" disabled>Previous</button>
                <button id="next-btn" class="primary-btn">Next</button>
                <button id="submit-btn" class="primary-btn hidden">Submit Quiz</button>
            </div>
        </div>

        <!-- Result Page -->
        <div id="result-page" class="view">
            <h1>Quiz Complete!</h1>
            <div class="score-display">
                <div class="score-circle">
                    <span id="final-score">0</span>
                    <span class="total">/ 10</span>
                </div>
            </div>
            <h2>Performance Breakdown</h2>
            <div id="breakdown-container" class="breakdown">
                <!-- Breakdown will be injected here -->
            </div>
            <button id="restart-btn" class="primary-btn">Restart Quiz</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
